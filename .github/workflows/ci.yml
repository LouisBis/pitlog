name: CI

on:
  pull_request:
    branches: [dev, main]

jobs:
  lint-client:
    name: Lint — client (ESLint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client
      - name: Run ESLint
        run: npm run lint
        working-directory: client

  typecheck-client:
    name: Typecheck — client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client
      - name: Run tsc
        run: npx tsc --noEmit
        working-directory: client

  typecheck-server:
    name: Typecheck — server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run tsc
        run: npx tsc --noEmit
        working-directory: server

  test-client:
    name: Test — client (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client
      - name: Run tests
        run: npm test
        working-directory: client

  test-server:
    name: Test — server (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
        working-directory: server
      - name: Run tests
        run: npm test
        working-directory: server

  docker-health:
    name: Docker health
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create env files
        run: |
          cp server/.env.example server/.env
          cp client/.env.example client/.env
      - name: Build and start containers
        run: docker compose up -d --build
      - name: Wait for server health
        run: timeout 60 bash -c 'until curl -sf http://localhost:3001/health; do sleep 2; done'
      - name: Tear down
        if: always()
        run: docker compose down

  build-pages:
    name: Build + smoke (GitHub Pages)
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
        working-directory: client
      - name: Build for GitHub Pages
        run: npm run build -- --base /pitlog/
        working-directory: client
        env:
          VITE_USE_MOCKS: 'true'
      - name: Install Playwright chromium
        run: npx playwright install --with-deps chromium
        working-directory: client
      - name: Run smoke tests
        run: npx playwright test
        working-directory: client

  branch-policy:
    name: Branch policy
    runs-on: ubuntu-latest
    if: github.base_ref == 'main'
    steps:
      - name: Enforce dev → main only
        run: |
          if [ "${{ github.head_ref }}" != "dev" ]; then
            echo "❌ Only 'dev' can merge into 'main'. Got: '${{ github.head_ref }}'"
            exit 1
          fi
          echo "✅ Source branch is 'dev' — allowed."
