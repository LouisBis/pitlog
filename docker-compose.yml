services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./client:/app
      - client_node_modules:/app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - server
    stdin_open: true

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app
      - server_node_modules:/app/node_modules
      - pitlog_data:/app/data
      - ./catalog:/app/catalog
    env_file:
      - ./server/.env

volumes:
  pitlog_data:
  client_node_modules:
  server_node_modules:
